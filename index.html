<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="header-left">
                <div class="header-content">
                    <h1>Workspace</h1>
                    <p id="current-date">Loading date...</p>
                </div>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                    <!-- Sun/Moon Icon will be injected via JS -->
                </button>
            </div>
            
            <div class="progress-ring-container">
                <svg class="progress-ring" width="40" height="40">
                    <circle class="progress-ring-circle-bg" stroke="var(--border)" stroke-width="4" fill="transparent" r="16" cx="20" cy="20"/>
                    <circle class="progress-ring-circle" id="progress-circle" stroke="var(--primary)" stroke-width="4" fill="transparent" r="16" cx="20" cy="20"/>
                </svg>
            </div>
        </header>

        <section class="input-section">
            <form id="todo-form" class="input-wrapper">
                <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <input 
                    type="text" 
                    id="task-input" 
                    placeholder="Create a new task..." 
                    autocomplete="off" 
                >
            </form>
        </section>

        <nav class="filters" id="filter-container">
            <button class="filter-btn active" data-filter="all">All Tasks</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </nav>

        <section class="list-section">
            <div id="empty-state" class="empty-state hidden">
                <svg width="64" height="64" fill="none" stroke="var(--text-tertiary)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <h3>No tasks found</h3>
                <p>You're all caught up. Enjoy your day!</p>
            </div>
            
            <ul id="task-list"></ul>
        </section>

        <footer class="app-footer">
            <span id="task-count" class="badge">0 tasks</span>
            <button id="clear-completed" class="text-btn">Clear completed</button>
        </footer>
    </main>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
